<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | VoiceForge AI</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        background: '#09090B',
                        surface: '#18181B',
                        primary: '#6D5BFF',
                        secondary: '#00D4FF',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Poppins', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #09090B; color: #FFFFFF; overflow-x: hidden;
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
        }
        .glass-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); }
        .btn-gradient { background: linear-gradient(135deg, #6D5BFF, #00D4FF); }
        .text-gradient {
            background: linear-gradient(135deg, #6D5BFF, #00D4FF);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .ambient-light {
            position: fixed; border-radius: 50%; filter: blur(120px); z-index: -1; opacity: 0.3;
            animation: pulse 8s ease-in-out infinite alternate;
        }
        @keyframes pulse {
            0% { transform: scale(1) translate(0, 0); opacity: 0.25; }
            100% { transform: scale(1.15) translate(20px, -20px); opacity: 0.4; }
        }
        .glitch-404 {
            font-size: 8rem;
            font-weight: 800;
            font-family: 'Poppins', sans-serif;
            line-height: 1;
            position: relative;
        }
        @media (max-width: 640px) { .glitch-404 { font-size: 5rem; } }

        .waveform-mini { display: flex; align-items: end; gap: 3px; height: 30px; justify-content: center; }
        .waveform-mini span { width: 3px; border-radius: 2px; background: linear-gradient(180deg, #00D4FF, #6D5BFF); animation: wave 1.2s ease-in-out infinite; }
        @keyframes wave { 0%, 100% { transform: scaleY(0.3); } 50% { transform: scaleY(1); } }
    </style>
</head>
<body class="p-4">

    <div class="ambient-light bg-primary w-[30rem] h-[30rem] top-[-10%] left-[-10%]"></div>
    <div class="ambient-light bg-secondary w-[25rem] h-[25rem] bottom-[-10%] right-[-5%]"></div>

    <div class="text-center max-w-lg relative z-10">
        <a href="index.html" class="inline-flex items-center gap-2 font-display text-xl font-bold tracking-tight mb-10 hover:opacity-80 transition-opacity">
            <span class="text-primary">◉</span> VoiceForge <span class="text-secondary">AI</span>
        </a>

        <video autoplay loop muted playsinline class="w-32 h-32 mx-auto mb-2">
            <source src="videos/404-float.mp4" type="video/mp4">
        </video>

        <p class="glitch-404 text-gradient mb-2">404</p>

        <div class="waveform-mini mb-6">
            <span style="height:10px; animation-delay:0s"></span>
            <span style="height:20px; animation-delay:0.1s"></span>
            <span style="height:30px; animation-delay:0.2s"></span>
            <span style="height:15px; animation-delay:0.3s"></span>
            <span style="height:25px; animation-delay:0.4s"></span>
            <span style="height:12px; animation-delay:0.5s"></span>
            <span style="height:22px; animation-delay:0.6s"></span>
        </div>

        <h1 class="font-display font-bold text-xl sm:text-2xl mb-3">Looks like this page went silent.</h1>
        <p class="text-gray-400 text-sm mb-8">The page you're looking for doesn't exist or may have been moved. Let's get you back on track.</p>

        <div class="flex flex-col sm:flex-row items-center justify-center gap-3">
            <a href="index.html" class="btn-gradient text-white font-semibold px-7 py-3.5 rounded-full hover:scale-105 transition-transform shadow-[0_0_25px_rgba(109,91,255,0.4)] w-full sm:w-auto">
                Back to Home
            </a>
            <a href="support.html" class="bg-white/5 hover:bg-white/10 border border-white/10 text-white font-medium px-7 py-3.5 rounded-full transition-colors w-full sm:w-auto">
                Contact Support
            </a>
        </div>

        <div class="mt-10 flex items-center justify-center gap-6 text-xs text-gray-500">
            <a href="dashboard.html" class="hover:text-white transition-colors">Dashboard</a>
            <a href="pricing.html" class="hover:text-white transition-colors">Pricing</a>
            <a href="voice-library.html" class="hover:text-white transition-colors">Voice Library</a>
        </div>
    </div>

</body>
</html>
