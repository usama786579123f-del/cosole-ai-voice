<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Activity - VoiceForge AI Admin</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        background: '#09090B',
                        surface: '#18181B',
                        primary: '#6D5BFF',
                        secondary: '#00D4FF',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Poppins', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        body { background-color: #09090B; color: #FFFFFF; }
        .glass-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); }
        .btn-gradient {
            background: linear-gradient(135deg, #6D5BFF, #00D4FF);
            box-shadow: 0 4px 15px rgba(109, 91, 255, 0.35), 0 2px 4px rgba(0,0,0,0.2);
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-gradient:hover { box-shadow: 0 6px 20px rgba(109, 91, 255, 0.5); transform: translateY(-2px); }
        .sidebar-link { transition: all 0.2s ease; }
        .sidebar-link:hover, .sidebar-link.active { background: rgba(109, 91, 255, 0.12); color: #fff; }
        .sidebar-link.active { border-left: 3px solid #6D5BFF; }
        .admin-badge { background: linear-gradient(135deg, #f43f5e, #f97316); }
        .activity-row:hover { background: rgba(255,255,255,0.02); }
    </style>
</head>
<body class="flex min-h-screen">

    <!-- ============ SIDEBAR ============ -->
    <aside class="w-64 bg-surface border-r border-white/10 flex flex-col fixed h-full">
        <div class="px-6 py-5 flex items-center gap-2 border-b border-white/10">
            <span class="text-primary text-lg">◉</span>
            <span class="font-display font-bold">VoiceForge AI</span>
            <span class="admin-badge text-white text-[9px] font-bold px-2 py-0.5 rounded-full ml-auto">ADMIN</span>
        </div>

        <nav class="flex-1 px-3 py-4 space-y-1 text-sm">
            <a href="dashboard.html" class="sidebar-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-400">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
                Admin Dashboard
            </a>
            <a href="users.html" class="sidebar-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-400">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a4 4 0 00-3-3.87M9 20H4v-2a4 4 0 013-3.87m6-8a4 4 0 11-8 0 4 4 0 018 0zm6 3a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                Manage Users
            </a>
            <a href="messages.html" class="sidebar-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-400">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path></svg>
                Messages
            </a>
            <a href="activity.html" class="sidebar-link active flex items-center gap-3 px-3 py-2.5 rounded-lg text-white font-medium">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                All Activity
            </a>
        </nav>

        <div class="px-3 py-4 border-t border-white/10 space-y-1 text-sm">
            <a href="../dashboard.html" class="sidebar-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-400">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                Back to Main Site
            </a>
            <button id="logoutBtn" class="sidebar-link w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-400 text-left">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                Logout
            </button>
        </div>
    </aside>

    <!-- ============ MAIN CONTENT ============ -->
    <div class="ml-64 flex-1 flex flex-col">

        <header class="flex items-center justify-between px-8 py-4 border-b border-white/10">
            <h1 class="font-display font-bold text-xl">All Activity</h1>
            <div class="flex items-center gap-2">
                <div class="w-9 h-9 rounded-full admin-badge flex items-center justify-center text-sm font-semibold" id="avatarInitial">A</div>
                <span class="text-sm font-medium" id="userNameTop">Admin</span>
            </div>
        </header>

        <main class="p-8">

            <div class="flex items-center justify-between mb-4">
                <div class="glass-card flex items-center gap-2 px-4 py-2 rounded-full w-72">
                    <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-4.35-4.35M17 11a6 6 0 11-12 0 6 6 0 0112 0z"></path></svg>
                    <input type="text" id="activitySearch" placeholder="Search by user or text..." class="bg-transparent outline-none text-sm w-full placeholder-gray-500">
                </div>
                <span class="text-xs text-gray-500" id="activityCount">Loading...</span>
            </div>

            <div class="glass-card rounded-2xl overflow-hidden">
                <table class="w-full text-sm">
                    <thead>
                        <tr class="text-left text-gray-500 text-xs border-b border-white/10">
                            <th class="p-4 font-medium">User</th>
                            <th class="p-4 font-medium">Text</th>
                            <th class="p-4 font-medium">Voice</th>
                            <th class="p-4 font-medium">Audio</th>
                            <th class="p-4 font-medium">Date</th>
                        </tr>
                    </thead>
                    <tbody id="activityBody" class="divide-y divide-white/5">
                        <tr><td colspan="5" class="p-8 text-center text-gray-500 text-sm">Loading activity...</td></tr>
                    </tbody>
                </table>
            </div>

        </main>
    </div>

    <script>
        const token = localStorage.getItem('token');
        const userStr = localStorage.getItem('user');

        if (!token || !userStr) {
            window.location.href = '../login.html';
        } else {
            const user = JSON.parse(userStr);
            if (user.role !== 'admin') {
                window.location.href = '../dashboard.html';
            } else {
                document.getElementById('userNameTop').textContent = user.name;
                document.getElementById('avatarInitial').textContent = user.name.charAt(0).toUpperCase();
            }
        }

        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = '../login.html';
        });

        let allActivity = [];

        async function loadActivity() {
            try {
                const res = await fetch('/api/admin/activity', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();

                if (!res.ok) {
                    document.getElementById('activityBody').innerHTML = `<tr><td colspan="5" class="p-8 text-center text-red-400 text-sm">${data.message || 'Access denied.'}</td></tr>`;
                    return;
                }

                allActivity = data.activity || [];
                document.getElementById('activityCount').textContent = `${allActivity.length} recent generations (across all users)`;
                renderActivity(allActivity);
            } catch (err) {
                document.getElementById('activityBody').innerHTML = '<tr><td colspan="5" class="p-8 text-center text-red-400 text-sm">Server error while loading activity.</td></tr>';
            }
        }

        function renderActivity(items) {
            const tbody = document.getElementById('activityBody');

            if (!items.length) {
                tbody.innerHTML = '<tr><td colspan="5" class="p-8 text-center text-gray-500 text-sm">No activity yet.</td></tr>';
                return;
            }

            tbody.innerHTML = items.map(item => `
                <tr class="activity-row">
                    <td class="p-4">
                        <p class="text-xs font-medium">${item.user ? item.user.name : 'Deleted User'}</p>
                        <p class="text-[10px] text-gray-500">${item.user ? item.user.email : '-'}</p>
                    </td>
                    <td class="p-4 max-w-xs truncate text-gray-300 text-xs">${(item.text || '').substring(0, 50)}${item.text && item.text.length > 50 ? '...' : ''}</td>
                    <td class="p-4 text-gray-400 text-xs">${item.voiceName || 'Unknown'}</td>
                    <td class="p-4">
                        ${item.audioUrl ? `<audio controls class="h-8" style="max-width:160px"><source src="${item.audioUrl}"></audio>` : '<span class="text-gray-600 text-xs">No audio</span>'}
                    </td>
                    <td class="p-4 text-gray-400 text-xs">${new Date(item.createdAt).toLocaleString()}</td>
                </tr>
            `).join('');
        }

        document.getElementById('activitySearch').addEventListener('input', (e) => {
            const q = e.target.value.toLowerCase();
            renderActivity(allActivity.filter(item =>
                (item.text || '').toLowerCase().includes(q) ||
                (item.user && item.user.name.toLowerCase().includes(q)) ||
                (item.user && item.user.email.toLowerCase().includes(q))
            ));
        });

        loadActivity();
    </script>

</body>
</html>
