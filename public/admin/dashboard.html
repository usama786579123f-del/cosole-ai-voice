<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - VoiceForge AI</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        background: '#09090B',
                        surface: '#18181B',
                        primary: '#6D5BFF',
                        secondary: '#00D4FF',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Poppins', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        body { background-color: #09090B; color: #FFFFFF; }
        .glass-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); }
        .btn-gradient { background: linear-gradient(135deg, #6D5BFF, #00D4FF); }
        .sidebar-link { transition: all 0.2s ease; }
        .sidebar-link:hover, .sidebar-link.active { background: rgba(109, 91, 255, 0.12); color: #fff; }
        .sidebar-link.active { border-left: 3px solid #6D5BFF; }
        .admin-badge { background: linear-gradient(135deg, #f43f5e, #f97316); }
    </style>
</head>
<body class="flex min-h-screen">

    <!-- ============ SIDEBAR ============ -->
    <aside class="w-64 bg-surface border-r border-white/10 flex flex-col fixed h-full">
        <div class="px-6 py-5 flex items-center gap-2 border-b border-white/10">
            <span class="text-primary text-lg">◉</span>
            <span class="font-display font-bold">VoiceForge AI</span>
            <span class="admin-badge text-white text-[9px] font-bold px-2 py-0.5 rounded-full ml-auto">ADMIN</span>
        </div>

        <nav class="flex-1 px-3 py-4 space-y-1 text-sm">
            <a href="dashboard.html" class="sidebar-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-white font-medium">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
                Admin Dashboard
            </a>
            <a href="admin/users.html" class="sidebar-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-400">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a4 4 0 00-3-3.87M9 20H4v-2a4 4 0 013-3.87m6-8a4 4 0 11-8 0 4 4 0 018 0zm6 3a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                Manage Users
            </a>
            <a href="admin/messages.html" class="sidebar-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-400">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path></svg>
                Messages
            </a>
            <a href="admin/activity.html" class="sidebar-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-400">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                All Activity
            </a>
        </nav>

        <div class="px-3 py-4 border-t border-white/10 space-y-1 text-sm">
            <a href="../dashboard.html" class="sidebar-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-400">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                Back to Main Site
            </a>
            <button id="logoutBtn" class="sidebar-link w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-400 text-left">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                Logout
            </button>
        </div>
    </aside>

    <!-- ============ MAIN CONTENT ============ -->
    <div class="ml-64 flex-1 flex flex-col">

        <header class="flex items-center justify-between px-8 py-4 border-b border-white/10">
            <h1 class="font-display font-bold text-xl">Admin Dashboard</h1>
            <div class="flex items-center gap-2">
                <div class="w-9 h-9 rounded-full admin-badge flex items-center justify-center text-sm font-semibold" id="avatarInitial">A</div>
                <span class="text-sm font-medium" id="userNameTop">Admin</span>
            </div>
        </header>

        <main class="p-8">

            <p id="accessMessage" class="text-sm text-red-400 mb-4"></p>

            <!-- Stats -->
            <div class="grid grid-cols-2 sm:grid-cols-4 gap-4 mb-8">
                <div class="glass-card rounded-2xl p-5">
                    <p class="text-xs text-gray-500 mb-1">Total Users</p>
                    <p class="font-display font-bold text-2xl" id="statTotalUsers">-</p>
                </div>
                <div class="glass-card rounded-2xl p-5">
                    <p class="text-xs text-gray-500 mb-1">Total Admins</p>
                    <p class="font-display font-bold text-2xl" id="statTotalAdmins">-</p>
                </div>
                <div class="glass-card rounded-2xl p-5">
                    <p class="text-xs text-gray-500 mb-1">Voices in Library</p>
                    <p class="font-display font-bold text-2xl" id="statTotalVoices">-</p>
                </div>
                <div class="glass-card rounded-2xl p-5">
                    <p class="text-xs text-gray-500 mb-1">Total Generations</p>
                    <p class="font-display font-bold text-2xl" id="statTotalGenerations">-</p>
                </div>
            </div>

            <!-- Recent Users -->
            <div class="glass-card rounded-2xl p-6">
                <div class="flex items-center justify-between mb-4">
                    <h2 class="font-semibold">Recent Users</h2>
                    <a href="admin/users.html" class="text-xs text-primary font-medium">Manage All Users →</a>
                </div>

                <table class="w-full text-sm">
                    <thead>
                        <tr class="text-left text-gray-500 text-xs border-b border-white/10">
                            <th class="pb-2 font-medium">Name</th>
                            <th class="pb-2 font-medium">Email</th>
                            <th class="pb-2 font-medium">Role</th>
                            <th class="pb-2 font-medium">Joined</th>
                        </tr>
                    </thead>
                    <tbody id="recentUsersBody" class="divide-y divide-white/5">
                        <tr><td colspan="4" class="py-6 text-center text-gray-500 text-xs">Loading...</td></tr>
                    </tbody>
                </table>
            </div>

        </main>
    </div>

    <script>
        const token = localStorage.getItem('token');
        const userStr = localStorage.getItem('user');

        if (!token || !userStr) {
            window.location.href = '../login.html';
        } else {
            const user = JSON.parse(userStr);
            if (user.role !== 'admin') {
                window.location.href = '../dashboard.html';
            } else {
                document.getElementById('userNameTop').textContent = user.name;
                document.getElementById('avatarInitial').textContent = user.name.charAt(0).toUpperCase();
            }
        }

        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = '../login.html';
        });

        async function loadStats() {
            try {
                const res = await fetch('/api/admin/stats', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();

                if (!res.ok) {
                    document.getElementById('accessMessage').textContent = data.message || 'Access denied.';
                    return;
                }

                document.getElementById('statTotalUsers').textContent = data.totalUsers;
                document.getElementById('statTotalAdmins').textContent = data.totalAdmins;
                document.getElementById('statTotalVoices').textContent = data.totalVoices;
                document.getElementById('statTotalGenerations').textContent = data.totalGenerations;
            } catch (err) {
                document.getElementById('accessMessage').textContent = 'Server error while loading stats.';
            }
        }

        async function loadRecentUsers() {
            try {
                const res = await fetch('/api/admin/users', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();

                if (!res.ok) return;

                const tbody = document.getElementById('recentUsersBody');
                const users = (data.users || []).slice(0, 8);

                if (!users.length) {
                    tbody.innerHTML = '<tr><td colspan="4" class="py-6 text-center text-gray-500 text-xs">No users found.</td></tr>';
                    return;
                }

                tbody.innerHTML = users.map(u => `
                    <tr class="text-xs">
                        <td class="py-3">${u.name}</td>
                        <td class="py-3 text-gray-400">${u.email}</td>
                        <td class="py-3">
                            <span class="px-2 py-1 rounded-full text-[10px] font-semibold ${u.role === 'admin' ? 'bg-red-500/20 text-red-400' : 'bg-white/5 text-gray-400'}">${u.role}</span>
                        </td>
                        <td class="py-3 text-gray-400">${new Date(u.createdAt).toLocaleDateString()}</td>
                    </tr>
                `).join('');
            } catch (err) {
                console.error('Could not load recent users', err);
            }
        }

        loadStats();
        loadRecentUsers();
    </script>

</body>
</html>
