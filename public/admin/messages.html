<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages - VoiceForge AI Admin</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        background: '#09090B',
                        surface: '#18181B',
                        primary: '#6D5BFF',
                        secondary: '#00D4FF',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Poppins', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        body { background-color: #09090B; color: #FFFFFF; }
        .glass-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); }
        .btn-gradient {
            background: linear-gradient(135deg, #6D5BFF, #00D4FF);
            box-shadow: 0 4px 15px rgba(109, 91, 255, 0.35), 0 2px 4px rgba(0,0,0,0.2);
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-gradient:hover { box-shadow: 0 6px 20px rgba(109, 91, 255, 0.5); transform: translateY(-2px); }
        .sidebar-link { transition: all 0.2s ease; }
        .sidebar-link:hover, .sidebar-link.active { background: rgba(109, 91, 255, 0.12); color: #fff; }
        .sidebar-link.active { border-left: 3px solid #6D5BFF; }
        .admin-badge { background: linear-gradient(135deg, #f43f5e, #f97316); }
        .msg-card { transition: all 0.2s ease; cursor: pointer; }
        .msg-card:hover { border-color: rgba(109,91,255,0.4); }
        .msg-card.unread { border-left: 3px solid #00D4FF; }
    </style>
</head>
<body class="flex min-h-screen">

    <!-- ============ SIDEBAR ============ -->
    <aside class="w-64 bg-surface border-r border-white/10 flex flex-col fixed h-full">
        <div class="px-6 py-5 flex items-center gap-2 border-b border-white/10">
            <span class="text-primary text-lg">◉</span>
            <span class="font-display font-bold">VoiceForge AI</span>
            <span class="admin-badge text-white text-[9px] font-bold px-2 py-0.5 rounded-full ml-auto">ADMIN</span>
        </div>

        <nav class="flex-1 px-3 py-4 space-y-1 text-sm">
            <a href="dashboard.html" class="sidebar-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-400">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
                Admin Dashboard
            </a>
            <a href="users.html" class="sidebar-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-400">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a4 4 0 00-3-3.87M9 20H4v-2a4 4 0 013-3.87m6-8a4 4 0 11-8 0 4 4 0 018 0zm6 3a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                Manage Users
            </a>
            <a href="messages.html" class="sidebar-link active flex items-center gap-3 px-3 py-2.5 rounded-lg text-white font-medium">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path></svg>
                Messages
            </a>
            <a href="activity.html" class="sidebar-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-400">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                All Activity
            </a>
        </nav>

        <div class="px-3 py-4 border-t border-white/10 space-y-1 text-sm">
            <a href="../dashboard.html" class="sidebar-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-400">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                Back to Main Site
            </a>
            <button id="logoutBtn" class="sidebar-link w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-400 text-left">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                Logout
            </button>
        </div>
    </aside>

    <!-- ============ MAIN CONTENT ============ -->
    <div class="ml-64 flex-1 flex flex-col">

        <header class="flex items-center justify-between px-8 py-4 border-b border-white/10">
            <h1 class="font-display font-bold text-xl">Customer Messages</h1>
            <div class="flex items-center gap-2">
                <div class="w-9 h-9 rounded-full admin-badge flex items-center justify-center text-sm font-semibold" id="avatarInitial">A</div>
                <span class="text-sm font-medium" id="userNameTop">Admin</span>
            </div>
        </header>

        <main class="p-8">

            <div class="flex items-center justify-between mb-4">
                <span class="text-xs text-gray-500" id="msgCount">Loading...</span>
                <span class="text-xs bg-secondary/20 text-secondary px-3 py-1 rounded-full" id="unreadBadge">0 unread</span>
            </div>

            <div id="messagesList" class="space-y-3">
                <p class="text-sm text-gray-500 text-center py-10">Loading messages...</p>
            </div>

        </main>
    </div>

    <script>
        const token = localStorage.getItem('token');
        const userStr = localStorage.getItem('user');

        if (!token || !userStr) {
            window.location.href = '../login.html';
        } else {
            const user = JSON.parse(userStr);
            if (user.role !== 'admin') {
                window.location.href = '../dashboard.html';
            } else {
                document.getElementById('userNameTop').textContent = user.name;
                document.getElementById('avatarInitial').textContent = user.name.charAt(0).toUpperCase();
            }
        }

        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = '../login.html';
        });

        const topicLabels = {
            general: 'General Inquiry',
            billing: 'Billing Question',
            technical: 'Technical Issue',
            feature: 'Feature Request'
        };

        async function loadMessages() {
            try {
                const res = await fetch('/api/messages', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();

                if (!res.ok) {
                    document.getElementById('messagesList').innerHTML = `<p class="text-sm text-red-400 text-center py-10">${data.message || 'Access denied.'}</p>`;
                    return;
                }

                const messages = data.messages || [];
                document.getElementById('msgCount').textContent = `${messages.length} total messages`;
                const unreadCount = messages.filter(m => m.status === 'new').length;
                document.getElementById('unreadBadge').textContent = `${unreadCount} unread`;

                renderMessages(messages);
            } catch (err) {
                document.getElementById('messagesList').innerHTML = '<p class="text-sm text-red-400 text-center py-10">Server error while loading messages.</p>';
            }
        }

        function renderMessages(messages) {
            const container = document.getElementById('messagesList');

            if (!messages.length) {
                container.innerHTML = '<p class="text-sm text-gray-500 text-center py-10">No messages yet.</p>';
                return;
            }

            container.innerHTML = messages.map(m => `
                <div class="glass-card msg-card rounded-2xl p-5 ${m.status === 'new' ? 'unread' : ''}" data-id="${m._id}">
                    <div class="flex items-start justify-between mb-2">
                        <div>
                            <p class="text-sm font-semibold">${m.name} ${m.status === 'new' ? '<span class="text-secondary text-[10px] ml-2">● NEW</span>' : ''}</p>
                            <p class="text-xs text-gray-500">${m.email}</p>
                        </div>
                        <div class="flex items-center gap-2">
                            <span class="text-[10px] bg-white/5 border border-white/10 rounded-full px-2 py-1 text-gray-400">${topicLabels[m.topic] || m.topic}</span>
                            <span class="text-[10px] text-gray-600">${new Date(m.createdAt).toLocaleDateString()}</span>
                        </div>
                    </div>
                    <p class="text-sm text-gray-300 leading-relaxed mb-3">${m.message}</p>
                    <div class="flex items-center gap-4">
                        ${m.status === 'new' ? `<button class="mark-read-btn text-xs text-secondary font-medium" data-id="${m._id}">Mark as Read</button>` : '<span class="text-xs text-gray-600">Read</span>'}
                        <a href="mailto:${m.email}" class="text-xs text-primary font-medium">Reply via Email →</a>
                        <button class="delete-msg-btn text-xs text-red-400 hover:text-red-300 ml-auto" data-id="${m._id}">Delete</button>
                    </div>
                </div>
            `).join('');

            container.querySelectorAll('.mark-read-btn').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    e.stopPropagation();
                    try {
                        await fetch(`/api/messages/${btn.dataset.id}/read`, {
                            method: 'PUT',
                            headers: { 'Authorization': `Bearer ${token}` }
                        });
                        loadMessages();
                    } catch (err) {
                        alert('Could not update message status.');
                    }
                });
            });

            container.querySelectorAll('.delete-msg-btn').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    e.stopPropagation();
                    if (!confirm('Delete this message?')) return;
                    try {
                        await fetch(`/api/messages/${btn.dataset.id}`, {
                            method: 'DELETE',
                            headers: { 'Authorization': `Bearer ${token}` }
                        });
                        loadMessages();
                    } catch (err) {
                        alert('Could not delete message.');
                    }
                });
            });
        }

        loadMessages();
    </script>

</body>
</html>
