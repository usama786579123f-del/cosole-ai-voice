<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoiceForge AI — Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #09090B; }
        .glass { background: rgba(24, 24, 27, 0.6); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.05); }
        .sidebar-link { transition: all 0.2s; color: #A1A1AA; }
        .sidebar-link:hover, .sidebar-link.active { color: #fff; background: rgba(109, 91, 255, 0.15); border-left: 2px solid #6D5BFF; }
    </style>
</head>
<body class="flex h-screen text-white overflow-hidden">

    <!-- LEFT SIDEBAR -->
    <aside class="w-64 glass hidden md:flex flex-col p-6 border-r border-white/5">
        <div class="flex items-center gap-2 mb-10 px-2">
            <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-primary to-secondary"></div>
            <span class="font-bold text-lg tracking-tight">VoiceForge</span>
        </div>
        
        <nav class="flex-1 space-y-1">
            <a href="#" class="sidebar-link active block px-4 py-2.5 rounded-lg text-sm">Dashboard</a>
            <a href="#" class="sidebar-link block px-4 py-2.5 rounded-lg text-sm">Text to Speech</a>
            <a href="#" class="sidebar-link block px-4 py-2.5 rounded-lg text-sm">Voice Library</a>
            <a href="#" class="sidebar-link block px-4 py-2.5 rounded-lg text-sm">My Projects</a>
        </nav>

        <div class="glass p-4 rounded-xl mt-auto">
            <p class="text-[11px] text-gray-500 uppercase tracking-wider mb-2">Credits Remaining</p>
            <div class="text-xl font-semibold mb-3">8,450 <span class="text-sm text-gray-500">/ 10k</span></div>
            <button class="w-full py-2 bg-white text-black text-xs font-bold rounded-lg hover:bg-gray-200">Upgrade Pro</button>
        </div>
    </aside>

    <!-- MAIN DASHBOARD -->
    <main class="flex-1 overflow-y-auto p-8">
        <header class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-2xl font-semibold">Welcome back, User</h1>
                <p class="text-gray-500 text-sm">Ready to create something amazing?</p>
            </div>
            <div class="flex items-center gap-4">
                <input type="text" placeholder="Search projects..." class="bg-surface glass px-4 py-2 rounded-lg text-sm border border-white/10 outline-none w-64">
                <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-primary to-secondary"></div>
            </div>
        </header>

        <!-- Stats Grid -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
            <div class="glass p-5 rounded-2xl">
                <p class="text-gray-500 text-xs mb-1">Total Generated</p>
                <h3 class="text-2xl font-bold">124</h3>
            </div>
            <!-- Duplicate this for other stats -->
            <div class="glass p-5 rounded-2xl"><p class="text-gray-500 text-xs mb-1">Characters</p><h3 class="text-2xl font-bold">45k</h3></div>
        </div>

        <!-- GENERATOR CARD -->
        <section class="glass p-8 rounded-3xl mb-8">
            <textarea id="scriptInput" class="w-full bg-transparent border-none text-lg resize-none outline-none mb-6" placeholder="Enter your text here..."></textarea>
            
            <div class="flex items-center justify-between">
                <div class="flex gap-2">
                    <button class="px-4 py-2 rounded-full bg-white/5 border border-white/10 text-sm hover:bg-white/10">Voice: Professional</button>
                    <button class="px-4 py-2 rounded-full bg-white/5 border border-white/10 text-sm hover:bg-white/10">Emotion: Excited</button>
                </div>
                <button id="generateBtn" class="bg-primary px-8 py-3 rounded-xl font-semibold hover:shadow-[0_0_20px_rgba(109,91,255,0.4)] transition-all">Generate Voice</button>
            </div>
        </section>

        <!-- Recent Projects -->
        <h2 class="text-lg font-semibold mb-4">Recent Projects</h2>
        <div class="glass rounded-2xl overflow-hidden">
            <table class="w-full text-sm text-left">
                <thead class="text-gray-500 border-b border-white/5">
                    <tr><th class="p-4">Project Name</th><th class="p-4">Date</th><th class="p-4">Status</th></tr>
                </thead>
                <tbody class="divide-y divide-white/5">
                    <tr><td class="p-4">Marketing Video AI</td><td class="p-4">July 12, 2026</td><td class="p-4 text-green-500">Completed</td></tr>
                </tbody>
            </table>
        </div>
    </main>
</body>
</html>
