<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History - VoiceForge AI</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        background: '#09090B',
                        surface: '#18181B',
                        primary: '#6D5BFF',
                        secondary: '#00D4FF',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Poppins', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        body { background-color: #09090B; color: #FFFFFF; }
        .glass-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); }

        .btn-gradient {
            background: linear-gradient(135deg, #6D5BFF, #00D4FF);
            box-shadow: 0 4px 15px rgba(109, 91, 255, 0.35), 0 2px 4px rgba(0,0,0,0.2);
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-gradient:hover {
            box-shadow: 0 6px 20px rgba(109, 91, 255, 0.5), 0 3px 8px rgba(0,0,0,0.25);
            transform: translateY(-2px);
        }
        .btn-gradient:active { transform: translateY(0px) scale(0.97); }

        .sidebar-link { transition: all 0.2s ease; }
        .sidebar-link:hover, .sidebar-link.active { background: rgba(109, 91, 255, 0.12); color: #fff; }
        .sidebar-link.active { border-left: 3px solid #6D5BFF; }
        .history-row:hover { background: rgba(255,255,255,0.03); }
        select { color: #fff; }
        select option { background-color: #18181B; color: #fff; }

        .credits-widget {
            background: linear-gradient(135deg, rgba(109,91,255,0.1), rgba(0,212,255,0.06));
            border: 1px solid rgba(109,91,255,0.3);
        }
        .credits-icon-wrap {
            width: 32px; height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, #6D5BFF, #00D4FF);
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 14px rgba(109,91,255,0.5);
            flex-shrink: 0;
        }
        .credits-bar { width: 100%; height: 4px; background: rgba(255,255,255,0.08); border-radius: 999px; overflow: hidden; }
        .credits-bar-fill { height: 100%; background: linear-gradient(90deg, #6D5BFF, #00D4FF); border-radius: 999px; box-shadow: 0 0 8px rgba(0,212,255,0.6); }
    </style>
</head>
<body class="flex min-h-screen">

    <!-- ============ SIDEBAR ============ -->

        <div class="px-6 py-5 flex items-center gap-2 border-b border-white/10">
            <span class="text-primary text-lg">◉</span>
            <span class="font-display font-bold">VoiceForge AI</span>
        </div>

        <nav class="flex-1 px-3 py-4 space-y-1 text-sm">
            <a href="dashboard.html" class="sidebar-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-400">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
                Dashboard
            </a>
            <a href="generator.html" class="sidebar-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-400">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0-11a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"></path></svg>
                Text to Speech
            </a>
            <a href="voice-library.html" class="sidebar-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-400">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7"></path><circle cx="12" cy="7" r="3" stroke-width="2"></circle></svg>
                Voice Library
            </a>
            <a href="my-projects.html" class="sidebar-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-400">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"></path></svg>
                My Projects
            </a>
            <a href="history.html" class="sidebar-link active flex items-center gap-3 px-3 py-2.5 rounded-lg text-white font-medium">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                History
            </a>
            <a href="api.html" class="sidebar-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-400">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16M6 8l-4 4 4 4m12-8l4 4-4 4"></path></svg>
                API Keys
            </a>
            <a href="pricing.html" class="sidebar-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-400">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V6m0 10v2"></path></svg>
                Pricing
            </a>
        </nav>

        <div class="px-3 py-4 border-t border-white/10 space-y-1 text-sm">
            <a href="docs.html" class="sidebar-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-400">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.746 0 3.332.477 4.5 1.253v13C19.832 18.477 18.246 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
                Documentation
            </a>
            <a href="settings.html" class="sidebar-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-400">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path></svg>
                Settings
            </a>
            <a href="profile.html" class="sidebar-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-400">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                Profile
            </a>
            <a href="support.html" class="sidebar-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-400">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18.364 5.636a9 9 0 010 12.728m0 0l-2.829-2.829m2.829 2.829L21 21M9.172 9.172a4 4 0 015.656 0M12 12h.01M6.343 6.343a9 9 0 000 12.728l2.829-2.829"></path></svg>
                Help & Support
            </a>
            <button id="logoutBtn" class="sidebar-link w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-400 text-left">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                Logout
            </button>
        </div>
    </aside>

    <!-- ============ MAIN CONTENT ============ -->
    <div class="ml-64 flex-1 flex flex-col">

        <header class="flex items-center justify-between px-8 py-4 border-b border-white/10">
            <div class="glass-card flex items-center gap-2 px-4 py-2 rounded-full w-72">
                <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-4.35-4.35M17 11a6 6 0 11-12 0 6 6 0 0112 0z"></path></svg>
                <input type="text" id="searchHistory" placeholder="Search history..." class="bg-transparent outline-none text-sm w-full placeholder-gray-500">
            </div>

            <div class="flex items-center gap-4">
                <div class="credits-widget flex items-center gap-3 pl-1.5 pr-4 py-1.5 rounded-full">
                    <div class="credits-icon-wrap">
                        <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                    </div>
                    <div class="flex flex-col leading-none gap-1 min-w-[110px]">
                        <div class="flex items-center justify-between">
                            <span class="text-[9px] font-semibold text-gray-500 uppercase tracking-wider">Credits</span>
                            <span class="text-[9px] font-semibold text-secondary">70%</span>
                        </div>
                        <span class="text-sm font-bold leading-none">5,420</span>
                        <div class="credits-bar">
                            <div class="credits-bar-fill" style="width:70%"></div>
                        </div>
                    </div>
                </div>
                <div class="flex items-center gap-2">
                    <div class="w-9 h-9 rounded-full bg-gradient-to-br from-primary to-secondary flex items-center justify-center text-sm font-semibold" id="avatarInitial">A</div>
                    <span class="text-sm font-medium" id="userNameTop">User</span>
                </div>
            </div>
        </header>

        <main class="p-8">
            <div class="flex items-center justify-between mb-6">
                <h1 class="font-display font-bold text-2xl">Generation History</h1>
                <span class="text-xs text-gray-500" id="historyCount">Loading...</span>
            </div>

            <div class="glass-card rounded-2xl overflow-hidden">
                <table class="w-full text-sm">
                    <thead>
                        <tr class="text-left text-gray-500 text-xs border-b border-white/10">
                            <th class="p-4 font-medium">Text</th>
                            <th class="p-4 font-medium">Voice</th>
                            <th class="p-4 font-medium">Date</th>
                            <th class="p-4 font-medium">Audio</th>
                            <th class="p-4 font-medium">Project</th>
                            <th class="p-4 font-medium text-right">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="historyBody" class="divide-y divide-white/5">
                        <tr>
                            <td colspan="6" class="p-8 text-center text-gray-500 text-sm">Loading history...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <script>
        const token = localStorage.getItem('token');
        const userStr = localStorage.getItem('user');

        if (!token || !userStr) {
            window.location.href = 'login.html';
        } else {
            const user = JSON.parse(userStr);
            document.getElementById('userNameTop').textContent = user.name;
            document.getElementById('avatarInitial').textContent = user.name.charAt(0).toUpperCase();
        }

        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = 'login.html';
        });

        let allHistory = [];
        let allProjects = [];

        async function loadProjectsForDropdown() {
            try {
                const res = await fetch('/api/projects', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                if (res.ok) {
                    allProjects = data.projects || [];
                }
            } catch (err) {
                console.error('Could not load projects', err);
            }
        }

        async function loadHistory() {
            try {
                const res = await fetch('/api/history', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();

                if (!res.ok) {
                    document.getElementById('historyBody').innerHTML = `<tr><td colspan="6" class="p-8 text-center text-red-400 text-sm">${data.message || 'Could not load history.'}</td></tr>`;
                    return;
                }

                allHistory = data.history || [];
                document.getElementById('historyCount').textContent = `${allHistory.length} generations`;
                renderHistory(allHistory);
            } catch (err) {
                document.getElementById('historyBody').innerHTML = '<tr><td colspan="6" class="p-8 text-center text-red-400 text-sm">Server error while loading history.</td></tr>';
            }
        }

        function renderHistory(items) {
            const tbody = document.getElementById('historyBody');

            if (!items.length) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="6" class="p-10 text-center text-gray-500 text-sm">
                            No history yet. <a href="generator.html" class="text-primary font-medium">Generate your first voice →</a>
                        </td>
                    </tr>`;
                return;
            }

            tbody.innerHTML = items.map(item => `
                <tr class="history-row">
                    <td class="p-4 max-w-xs truncate text-gray-300">${(item.text || '').substring(0, 60)}${item.text && item.text.length > 60 ? '...' : ''}</td>
                    <td class="p-4 text-gray-400">${item.voiceName || 'Unknown'}</td>
                    <td class="p-4 text-gray-400 text-xs">${new Date(item.createdAt).toLocaleString()}</td>
                    <td class="p-4">
                        ${item.audioUrl ? `<audio controls class="h-8" style="max-width:180px"><source src="${item.audioUrl}"></audio>` : '<span class="text-gray-600 text-xs">No audio</span>'}
                    </td>
                    <td class="p-4">
                        <select class="project-select bg-white/5 border border-white/10 rounded-lg px-2 py-1.5 text-xs outline-none" data-id="${item._id}">
                            <option value="">No Project</option>
                            ${allProjects.map(p => `<option value="${p._id}" ${item.project && item.project._id === p._id ? 'selected' : ''}>${p.name}</option>`).join('')}
                        </select>
                    </td>
                    <td class="p-4 text-right">
                        <button class="delete-history-btn text-red-400 hover:text-red-300 text-xs" data-id="${item._id}">Delete</button>
                    </td>
                </tr>
            `).join('');

            tbody.querySelectorAll('.project-select').forEach(select => {
                select.addEventListener('change', async () => {
                    try {
                        await fetch(`/api/history/${select.dataset.id}/project`, {
                            method: 'PUT',
                            headers: {
                                'Content-Type': 'application/json',
                                'Authorization': `Bearer ${token}`
                            },
                            body: JSON.stringify({ projectId: select.value || null })
                        });
                    } catch (err) {
                        alert('Could not update project.');
                    }
                });
            });

            tbody.querySelectorAll('.delete-history-btn').forEach(btn => {
                btn.addEventListener('click', async () => {
                    if (!confirm('Delete this item from history?')) return;
                    try {
                        const res = await fetch(`/api/history/${btn.dataset.id}`, {
                            method: 'DELETE',
                            headers: { 'Authorization': `Bearer ${token}` }
                        });
                        if (res.ok) {
                            loadHistory();
                        } else {
                            alert('Could not delete item.');
                        }
                    } catch (e) {
                        alert('Server error while deleting.');
                    }
                });
            });
        }

        document.getElementById('searchHistory').addEventListener('input', (e) => {
            const q = e.target.value.toLowerCase();
            renderHistory(allHistory.filter(item => (item.text || '').toLowerCase().includes(q) || (item.voiceName || '').toLowerCase().includes(q)));
        });

        loadProjectsForDropdown().then(loadHistory);
    </script>

</body>
</html>
